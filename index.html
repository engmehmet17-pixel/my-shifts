<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المناوبات - قطاع داقوق</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        
        /* واجهة الدخول */
        #login-page { text-align: center; margin-top: 50px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .login-header h1 { font-size: 1.4em; color: #2c3e50; margin-bottom: 5px; }
        .login-header p { font-size: 0.9em; color: #666; margin: 2px 0; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
        button { background: #2c3e50; color: white; padding: 10px 30px; border-radius: 10px; border: none; cursor: pointer; }
        
        /* واجهة الجدول */
        #main-app { display: none; }
        .header { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .timer-box { font-size: 14px; color: #e67e22; font-weight: bold; margin-top: 5px; }
        .logout-btn { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; position: absolute; left: 15px; top: 15px; }
        
        .card { background: white; padding: 18px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 8px 12px rgba(0,0,0,0.05); border-right: 10px solid; }
        .card[data-center="القطاع"] { border-right-color: #3498db; }
        .card[data-center="داقوق"] { border-right-color: #e67e22; }
        .card[data-center="تازة"] { border-right-color: #9b59b6; }
        .card[data-center="ليلان"] { border-right-color: #e74c3c; }
        .card[data-center="الرشاد"] { border-right-color: #f1c40f; }
        
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e1e8ed; font-size: 15px; }
        .phone-box { margin-top: 10px; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-header">
        <h1>وزارة الكهرباء العراقية</h1>
        <p>الشركة العامة لتوزيع كهرباء الشمال</p>
        <p>قطاع كهرباء داقوق</p>
        <p>شعبة الشكاوي وشؤون المواطنين</p>
    </div>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    <h2>🔐 تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم"><br>
    <input type="password" id="password" placeholder="الرمز السري"><br>
    <button onclick="checkLogin()">دخول</button>
    <p id="error-msg" style="color:red;"></p>
</div>

<div id="main-app">
    <div class="header">
        <button class="logout-btn" onclick="logout()">خروج 🚪</button>
        <div style="text-align: center;">
            <strong id="clock">00:00:00</strong>
            <div id="today-date" style="font-size: 12px;"></div>
            <div class="timer-box" id="countdown">جاري الحساب...</div>
        </div>
    </div>
    <div id="app"></div>
</div>

<script>
    function checkLogin() {
        if (document.getElementById('username').value === "داقوق" && document.getElementById('password').value === "1122") {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            startIntervals();
        } else {
            document.getElementById('error-msg').innerText = "خطأ في اسم المستخدم أو الرمز!";
        }
    }

    function logout() {
        location.reload(); 
    }

    // تم تعديل ترتيب الأسماء هنا حسب طلبك
    let staffData = JSON.parse(localStorage.getItem('myStaffList')) || {
        "القطاع": [
            {n: "علي عبدالكريم حسين", p: "07705122140"}, 
            {n: "احمد علي هزاع", p: "07708504330"}, 
            {n: "مؤيد انور علي", p: "07702307824"}, 
            {n: "محمد اصغر شريف", p: "07705119671"}
        ],
        "داقوق": [
            {n: "سليم طه بزون", p: "07704307475"}, 
            {n: "جمعة احمد علاوي", p: "07706671144"}, 
            {n: "خنكار رضا قادر", p: "07748193844"}
        ],
        "تازة": [
            {n: "عماد حسن حسين", p: "07701231951"}, 
            {n: "مكرم شاكر صالح", p: "07738321128"}, 
            {n: "غريب عبدالله علي", p: "07738321108"}, 
            {n: "عقيل حمدي خورشيد", p: "07719849187"}
        ],
        "ليلان": [
            {n: "محمد داود طعمة", p: "07702365033"}, 
            {n: "هشام كريم علي", p: "07706668042"}, 
            {n: "شعبان خلف طعمة", p: "07735876486"}
        ],
        "الرشاد": [
            {n: "زياد خلف حسن", p: "07705032908"}, 
            {n: "عبدالستار احمد صالح", p: "07704914902"}
        ]
    };

    function startIntervals() {
        render();
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-EG');
            
            let nextShift = new Date();
            nextShift.setHours(8, 0, 0, 0);
            if (now.getHours() >= 8) nextShift.setDate(nextShift.getDate() + 1);
            
            let diff = nextShift - now;
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText = `المتبقي للتبديل القادم: ${h}س ${m}د ${s}ث`;
            
            if (h === 0 && m === 0 && s === 0) render();
        }, 1000);
    }

    function render() {
        const now = new Date();
        const adjustedNow = new Date(now.getTime() - (8 * 60 * 60 * 1000));
        const refDate = new Date(2026, 2, 9);
        const dayDiff = Math.floor((adjustedNow - refDate) / 86400000);
        
        document.getElementById('today-date').innerText = now.toLocaleDateString('ar-EG', {dateStyle: 'full'});
        
        let html = '';
        for (let center in staffData) {
            let list = staffData[center];
            let idx = (center === "ليلان" || center === "الرشاد") ? Math.floor(dayDiff / 2) % list.length : dayDiff % list.length;
            
            html += `<div class="card" data-center="${center}">
                <h3>📍 ${center}</h3>
                <select onchange="updateList('${center}', this.value, ${idx})">
                    ${list.map((item, i) => `<option value="${item.n}" ${i == idx ? 'selected' : ''}>👤 ${item.n}</option>`).join('')}
                </select>
                <div class="phone-box">📞 هاتف: ${list[idx].p}</div>
            </div>`;
        }
        document.getElementById('app').innerHTML = html;
    }

    function updateList(center, newName, currentIndex) {
        let list = staffData[center];
        let newIdx = list.findIndex(item => item.n === newName);
        let temp = list[currentIndex];
        list[currentIndex] = list[newIdx];
        list[newIdx] = temp;
        localStorage.setItem('myStaffList', JSON.stringify(staffData));
        render();
    }
</script>
</body>
</html>
