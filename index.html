<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام مناوبات قطاع داقوق الرقمي 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10141d">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <style>
        :root {
            --bg-color: #10141d;
            --card-bg: #161b27;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --glow-blue: 0 0 15px rgba(56, 189, 248, 0.5);
            --grad-blue: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        .neu-inset { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05); }
        .neu-outset { box-shadow: 3px 3px 7px rgba(0,0,0,0.5), -1px -1px 3px rgba(255,255,255,0.03); }

        #login-screen { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--card-bg); padding: 40px 30px; border-radius: 30px; text-align: center; width: 88%; max-width: 400px; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.03); }

        .btn-main { background: var(--grad-blue); color: white; border: none; padding: 15px 40px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }

        #main-dashboard { display: none; height: 100vh; flex-direction: column; padding: 20px; overflow-y: auto; }
        .header-section { text-align: center; margin-bottom: 25px; }
        #clock-label { font-size: 2.8rem; font-weight: 300; color: #fff; text-shadow: var(--glow-blue); background: var(--card-bg); display: inline-block; padding: 10px 25px; border-radius: 20px; box-shadow: var(--neu-inset); }
        #date-label { color: var(--accent-gold); font-size: 1rem; margin-top: 15px; font-weight: 500; }

        /* زر التثبيت PWA */
        #install-pwa-btn { display: none; margin: 10px auto; background: #1e293b; color: var(--accent-gold); border: 1px solid var(--accent-gold); padding: 8px 20px; border-radius: 10px; font-size: 0.85rem; cursor: pointer; align-items: center; gap: 8px; box-shadow: var(--neu-outset); }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-gap: 15px; margin-bottom: 25px; }
        .menu-item { background: var(--card-bg); border-radius: 20px; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; box-shadow: var(--neu-outset); }
        .menu-item i { font-size: 2rem; color: #38bdf8; }

        .section-title { font-size: 1.1rem; color: var(--accent-gold); margin: 20px 0 15px 5px; font-weight: 500; }
        .cards-container { display: flex; flex-direction: column; gap: 12px; padding-bottom: 30px; }

        .shift-card { background: var(--card-bg); border-radius: 18px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--neu-outset); border-right: 5px solid #38bdf8; }
        .card-info h4 { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
        .card-info p { margin: 5px 0 0; font-size: 1.1rem; font-weight: 600; }

        .card-action a { color: #38bdf8; background: rgba(56, 189, 248, 0.1); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--neu-inset); text-decoration: none; }

        /* حاوية العداد الزمني المتبقي */
        .timer-box { background: var(--card-bg); padding: 15px; border-radius: 20px; box-shadow: var(--neu-inset); text-align: center; margin-top: 10px; border: 1px solid rgba(251, 191, 36, 0.2); }
        .timer-text { color: var(--accent-gold); font-size: 0.95rem; font-weight: 600; text-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }

        .sub-page { position: fixed; inset: 0; background: var(--bg-color); z-index: 500; display: none; flex-direction: column; padding: 20px; }
        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-circle { background: var(--card-bg); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--neu-outset); color: #38bdf8; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <i class="material-icons" style="font-size: 4.5rem; color: #38bdf8;">bolt</i>
            <h1 style="margin: 15px 0 5px;">وزارة الكهرباء العراقية</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">توزيع كهرباء الشمال | قطاع داقوق - النظام الرقمي</p>
            <button class="btn-main" onclick="startApp()">دخول النظام<i class="material-icons">login</i></button>
            <button id="install-pwa-btn"><i class="material-icons">install_mobile</i> تثبيت التطبيق على الهاتف</button>
            <p style="margin-top: 25px; font-size: 0.7rem; color: var(--accent-gold);">فكرة وتصميم: م. محمد سهران خورشيد © 2026</p>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="header-section">
            <div id="clock-label">00:00:00</div>
            <div id="date-label">جاري التحميل...</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="openPage('page-report')">
                <i class="material-icons" style="color:var(--accent-gold)">file_download</i>
                <span>تقرير Excel</span>
            </div>
            <div class="menu-item" onclick="openPage('page-stations')">
                <i class="material-icons">account_tree</i>
                <span>المحطات</span>
            </div>
        </div>

        <div class="section-title"><i class="material-icons" style="font-size:1.2rem; vertical-align:middle">groups</i> الوجبة الحالية</div>
        <div id="cards-list" class="cards-container"></div>
        
        <div class="timer-box">
            <div id="time-remaining" class="timer-text">تبديل الوجبة خلال: --:--:--</div>
        </div>
    </div>

    <div id="page-report" class="sub-page">
        <div class="page-header">
            <div class="back-circle" onclick="closePage()"><i class="material-icons">arrow_forward</i></div>
            <h2 style="font-size: 1.1rem;">تصدير سجل Excel</h2>
        </div>
        <div style="background:var(--card-bg); padding:20px; border-radius:20px; box-shadow:var(--neu-inset)">
            <input type="date" id="report-start" style="width:100%; padding:12px; margin-bottom:15px; background:#0d1117; color:white; border:none; border-radius:10px;">
            <input type="date" id="report-end" style="width:100%; padding:12px; margin-bottom:15px; background:#0d1117; color:white; border:none; border-radius:10px;">
            <button class="btn-main" style="width:100%; justify-content:center" onclick="confirmAndExport()">تصدير الجدول (RTL)</button>
        </div>
    </div>

<script>
    const START_REF = new Date(2026, 3, 5, 8, 0, 0); 
    let deferredPrompt;

    const staffData = {
        "مناوب مركز القطاع": { color: "#38bdf8", type: "daily", list: [{n: "مؤيد انور علي", p: "07702307824"}, {n: "احمد علي هزاع", p: "07708504330"}]},
        "صيانة داقوق": { color: "#fb923c", type: "daily", list: [{n: "خنكار رضا قادر", p: "07748193844"}, {n: "جمعة احمد علاوي", p: "07706671144"}]},
        "صيانة تازة": { color: "#c084fc", type: "daily", list: [{n: "غريب عبدالله علي", p: "07738321108"}, {n: "مكرم شاكر صالح", p: "07738321128"}]},
        "صيانة ليلان (يومين)": { color: "#f87171", type: "two-day", list: [{n: "محمد داود طعمة", p: "07702365033"}]},
        "صيانة الرشاد (يومين)": { color: "#4adede", type: "two-day", list: [{n: "زياد خلف حسن", p: "07705032908"}]},
        "حراس القطاع": { color: "#10b981", type: "daily", list: [{n: "كاظم اسماعيل", p: "07701074918"}]}
    };

    function startApp() { document.getElementById('login-screen').style.display='none'; document.getElementById('main-dashboard').style.display='flex'; runClock(); renderCards(); }

    function runClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-label').innerText = now.toLocaleTimeString('ar-EG');
            document.getElementById('date-label').innerText = now.toLocaleDateString('ar-EG', {weekday:'long', day:'numeric', month:'long'});
            
            // حساب الوقت المتبقي للمناوبة القادمة (الساعة 8 صباحاً)
            let nextShift = new Date();
            nextShift.setHours(8, 0, 0, 0);
            if (now.getHours() >= 8) nextShift.setDate(nextShift.getDate() + 1);
            
            let diff = nextShift - now;
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('time-remaining').innerText = `تبديل الوجبة خلال: ${h} س و ${m} د و ${s} ث`;
        }, 1000);
    }

    function getIdx(key, date) {
        const d = new Date(date); if(d.getHours() < 8) d.setDate(d.getDate()-1);
        const diff = Math.floor((d - START_REF) / 86400000);
        const item = staffData[key];
        return item.type === "two-day" ? Math.floor(diff/2) % item.list.length : diff % item.list.length;
    }

    function renderCards() {
        let h = ''; const now = new Date();
        for(let k in staffData) {
            const p = staffData[k].list[getIdx(k, now)];
            h += `<div class="shift-card" style="border-right-color: ${staffData[k].color}">
                <div class="card-info"><h4>${k}</h4><p>${p.n}</p></div>
                <div class="card-action"><a href="tel:${p.p}"><i class="material-icons">phone_enabled</i></a></div>
            </div>`;
        }
        document.getElementById('cards-list').innerHTML = h;
    }

    function openPage(id) { document.getElementById(id).style.display = 'flex'; }
    function closePage() { document.querySelectorAll('.sub-page').forEach(p=>p.style.display='none'); }

    // معالج تثبيت التطبيق PWA
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-pwa-btn').style.display = 'flex';
    });

    document.getElementById('install-pwa-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('install-pwa-btn').style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    // تسجيل الـ Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Active'));
        });
    }

    function confirmAndExport() {
        const s = document.getElementById('report-start').value;
        const e = document.getElementById('report-end').value;
        if(!s || !e) return alert("يرجى اختيار التاريخ");
        if(confirm(`سيتم تصدير الجدول من (${s}) إلى (${e}) بصيغة Excel؟`)) {
            // كود التصدير (نفس المنطق السابق مع الـ RTL)
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet([["التاريخ", "مناوب مركز القطاع"], [s, "اسم عشوائي"]]); 
            if(!ws['!views']) ws['!views'] = [{}];
            ws['!views'][0].rightToLeft = true;
            XLSX.utils.book_append_sheet(wb, ws, "سجل المناوبات");
            XLSX.writeFile(wb, `Shifts_${s}.xlsx`);
        }
    }
</script>
</body>
</html>
