<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام داقوق الرقمي 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --main-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--main-bg); color: white; overflow: hidden; }

        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b, #0f172a); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }

        .enter-btn { background: linear-gradient(45deg, var(--accent-blue), #2563eb); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        #main-dashboard { display: none; height: 100vh; flex-direction: column; padding: 15px; }

        .header-card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 15px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; grid-gap: 12px; flex-grow: 1; }

        .menu-item { border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; color: white; font-weight: bold; cursor: pointer; gap: 10px; }
        .menu-item i { font-size: 2.5rem; }

        .bg-blue { background: linear-gradient(135deg, #1e40af, #3b82f6); }
        .bg-green { background: linear-gradient(135deg, #065f46, #10b981); }
        .bg-gold { background: linear-gradient(135deg, #92400e, #f59e0b); }
        .bg-red { background: linear-gradient(135deg, #991b1b, #ef4444); }

        .sub-page { position: fixed; inset: 0; background: var(--main-bg); z-index: 500; display: none; flex-direction: column; padding: 15px; }

        .back-btn { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 12px; margin-bottom: 10px; align-self: flex-start; }

        .shift-card { background: var(--card-bg); padding: 15px; border-radius: 20px; margin-bottom: 10px; border-right: 6px solid var(--accent-blue); }

        input[type="date"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #334155; }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>

    <div id="login-screen">
        <h1 style="margin:0">وزارة الكهرباء العراقية</h1>
        <p style="opacity:0.7">توزيع كهرباء الشمال | قطاع داقوق - نظام المناوبات الرقمي</p>
        <div style="margin: 30px 0;"><button class="enter-btn" onclick="startApp()">دخول</button></div>
        <div style="font-size:0.8rem; color:var(--accent-blue)">فكرة وتصميم م. محمد سهران خورشيد © 2026</div>
    </div>

    <div id="main-dashboard">
        <div class="header-card">
            <div id="date-label" style="font-weight:bold; color:var(--accent-gold)"></div>
            <div id="clock-label" style="font-size: 2rem; margin: 5px 0; letter-spacing: 2px;">00:00:00</div>
            <div id="timer-label" style="font-size:0.85rem; opacity:0.9"></div>
        </div>
        <div class="menu-grid">
            <button class="menu-item bg-blue" onclick="openPage('page-sector')"><i class="material-icons">groups</i><span>المناوبات</span></button>
            <button class="menu-item bg-green" onclick="openPage('page-stations')"><i class="material-icons">ev_station</i><span>المحطات</span></button>
            <button class="menu-item bg-gold" onclick="openPage('page-report')"><i class="material-icons">table_view</i><span>تحميل Excel</span></button>
            <button class="menu-item bg-red" onclick="location.reload()"><i class="material-icons">power_settings_new</i><span>خروج</span></button>
        </div>
    </div>

    <div id="page-sector" class="sub-page">
        <button class="back-btn" onclick="closePage()">🔙 عودة</button>
        <div id="sector-list" style="overflow-y:auto; flex-grow:1;"></div>
    </div>

    <div id="page-report" class="sub-page">
        <button class="back-btn" onclick="closePage()">🔙 عودة</button>
        <div style="background:var(--card-bg); padding:20px; border-radius:20px;">
            <h3 style="text-align:center">تصدير الجدول إلى Excel</h3>
            <p style="font-size: 0.8rem; text-align: center; opacity: 0.8;">سيتم حفظ الملف في هاتفك باللغة العربية ومن اليمين لليسار.</p>
            <label>من تاريخ:</label><input type="date" id="report-start">
            <label>إلى تاريخ:</label><input type="date" id="report-end">
            <button class="enter-btn" style="width:100%; margin-top:15px;" onclick="exportToExcel()">تحميل ملف Excel الآن</button>
        </div>
    </div>

    <div id="page-stations" class="sub-page">
        <button class="back-btn" onclick="closePage()">🔙 عودة</button>
        <div class="header-card"><h3>مناوبي المحطات</h3><p>قيد التحديث...</p></div>
    </div>

<script>
    const START_REF = new Date(2026, 3, 4, 8, 0, 0); // السبت 4 نيسان 2026

    const staffData = {
        "القطاع": { type: "daily", list: [{n: "احمد علي هزاع", p: "07708504330"}, {n: "مؤيد انور علي", p: "07702307824"}, {n: "محمد أصغر شريف", p: "07705119671"}, {n: "علي عبدالكريم حسين", p: "07705122140"}]},
        "صيانة داقوق": { type: "daily", list: [{n: "جمعة احمد علاوي", p: "07706671144"}, {n: "خنكار رضا قادر", p: "07748193844"}, {n: "سليم طه بزون", p: "07704307475"}]},
        "صيانة تازة": { type: "daily", list: [{n: "مكرم شاكر صالح", p: "07738321128"}, {n: "غريب عبدالله علي", p: "07738321108"}, {n: "عقيل حمدي خورشيد", p: "07719849187"}, {n: "عماد حسن حسين", p: "07701231951"}]},
        "صيانة ليلان": { type: "two-day", list: [{n: "محمد داود طعمة", p: "07702365033"}, {n: "هشام كريم علي", p: "07706668042"}, {n: "شعبان خلف طعمة", p: "07735876486"}]},
        "صيانة الرشاد": { type: "two-day", list: [{n: "زياد خلف حسن", p: "07705032908"}, {n: "عبدالستار احمد صالح", p: "07704914902"}]},
        "حراس القطاع": { type: "daily", list: [{n: "احمد نورالدين", p: "07708592190"}, {n: "كاظم اسماعيل", p: "07701074918"}, {n: "عقيل أصغر", p: "07701274082"}]}
    };

    function startApp() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'flex'; runClock(); renderSector(); }

    function runClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('date-label').innerText = now.toLocaleDateString('ar-EG', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            document.getElementById('clock-label').innerText = now.toLocaleTimeString('ar-EG');
            let next = new Date(); next.setHours(8,0,0,0); if(now.getHours() >= 8) next.setDate(next.getDate()+1);
            let diff = next - now;
            let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById('timer-label').innerText = `المتبقي للتبديل: ${h}س و ${m}د و ${s}ث`;
        }, 1000);
    }

    function getIdx(key, date) {
        const d = new Date(date); if(d.getHours() < 8) d.setDate(d.getDate()-1);
        const diff = Math.floor((d - START_REF) / 86400000);
        if(diff < 0) return 0;
        const item = staffData[key];
        return item.type === "two-day" ? Math.floor(diff/2) % item.list.length : diff % item.list.length;
    }

    function renderSector() {
        let h = ''; const now = new Date();
        for(let k in staffData) {
            const p = staffData[k].list[getIdx(k, now)];
            h += `<div class="shift-card"><div>${k}</div><b>${p.n}</b><div style="color:var(--accent-blue)">${p.p}</div></div>`;
        }
        document.getElementById('sector-list').innerHTML = h;
    }

    function openPage(id) { document.getElementById(id).style.display = 'flex'; }
    function closePage() { document.querySelectorAll('.sub-page').forEach(p=>p.style.display='none'); }

    // وظيفة التصدير إلى Excel الجديدة
    function exportToExcel() {
        const sStr = document.getElementById('report-start').value;
        const eStr = document.getElementById('report-end').value;
        if(!sStr || !eStr) return alert("يرجى اختيار تاريخ البداية والنهاية");

        const start = new Date(sStr);
        const end = new Date(eStr);
        
        // تجهيز البيانات للـ Excel
        const data = [];
        // العناوين مرتبة من اليمين
        data.push(["التاريخ", "القطاع", "صيانة داقوق", "صيانة تازة", "صيانة ليلان", "صيانة الرشاد", "حراس القطاع"]);

        let curr = new Date(start);
        curr.setHours(9, 0, 0);

        while(curr <= end) {
            data.push([
                curr.toLocaleDateString('ar-EG'),
                staffData["القطاع"].list[getIdx("القطاع", curr)].n,
                staffData["صيانة داقوق"].list[getIdx("صيانة داقوق", curr)].n,
                staffData["صيانة تازة"].list[getIdx("صيانة تازة", curr)].n,
                staffData["صيانة ليلان"].list[getIdx("صيانة ليلان", curr)].n,
                staffData["صيانة الرشاد"].list[getIdx("صيانة الرشاد", curr)].n,
                staffData["حراس القطاع"].list[getIdx("حراس القطاع", curr)].n
            ]);
            curr.setDate(curr.getDate() + 1);
        }

        // إنشاء كتاب العمل والورقة
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);

        // ضبط اتجاه الورقة من اليمين لليسار (RTL)
        if(!ws['!views']) ws['!views'] = [{}];
        ws['!views'][0].rightToLeft = true;

        XLSX.utils.book_append_sheet(wb, ws, "جدول المناوبات");

        // تحميل الملف
        XLSX.writeFile(wb, `سجل_مناوبات_داقوق_${sStr}.xlsx`);
    }

</script>
</body>
</html>
