<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام داقوق الرقمي 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --main-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --accent-1: #38bdf8; /* صيانة */
            --accent-2: #fb923c; /* داقوق */
            --accent-3: #c084fc; /* تازة */
            --accent-4: #f87171; /* ليلان */
            --accent-5: #4adede; /* الرشاد */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--main-bg); color: var(--text-color);
            overflow: hidden; 
        }

        /* شريط التثبيت العلوي */
        #install-banner {
            display: none; background: #1e293b; padding: 10px;
            text-align: center; border-bottom: 2px solid var(--accent-1);
        }

        /* واجهة الدخول */
        #login-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; text-align: center;
        }

        .enter-btn {
            background: linear-gradient(45deg, #0ea5e9, #2563eb);
            color: white; border: none; padding: 18px 60px; border-radius: 50px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4);
        }

        /* الواجهة الرئيسية */
        #main-dashboard { display: none; height: 100vh; flex-direction: column; padding: 15px; }

        .header-section {
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 25px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; grid-gap: 15px; flex-grow: 1; }

        .menu-btn {
            border-radius: 25px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            font-weight: bold; font-size: 1.1rem; border: none; color: white;
            transition: 0.3s; cursor: pointer;
        }

        .btn-1 { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .btn-2 { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-3 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-4 { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        /* صفحة العرض */
        .sub-page {
            position: fixed; inset: 0; background: #0f172a; z-index: 500;
            display: none; flex-direction: column; padding: 15px;
        }

        .shift-card {
            background: rgba(255,255,255,0.05); margin-bottom: 12px; padding: 20px;
            border-radius: 20px; display: flex; align-items: center;
            border-right: 8px solid;
        }

        .back-btn { background: #334155; color: white; border: none; padding: 12px 25px; border-radius: 15px; margin-bottom: 15px; width: fit-content; }

        /* التقرير */
        .report-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #475569; background: #1e293b; color: white; }
    </style>
</head>
<body>

    <div id="install-banner">
        <button onclick="installPWA()" style="background:var(--accent-1); border:none; padding:8px 20px; border-radius:10px; color:black; font-weight:bold;">تثبيت تطبيق المناوبات 📱</button>
    </div>

    <div id="login-screen">
        <h1 style="font-size: 1.5rem;">وزارة الكهرباء العراقية</h1>
        <p style="opacity: 0.7;">توزيع كهرباء الشمال | قطاع داقوق</p>
        <div style="margin: 40px 0;">
            <button class="enter-btn" onclick="openDashboard()">دخول للنظام</button>
        </div>
        <p style="font-size: 0.8rem; color: #94a3b8;">من فكرة وتصميم: م. محمد سهران خورشيد © 2026</p>
    </div>

    <div id="main-dashboard">
        <div class="header-section">
            <div id="dash-date" style="font-size: 1.3rem; font-weight: bold; color: var(--accent-1);"></div>
            <div id="dash-clock" style="font-size: 1.8rem; margin: 5px 0;">00:00:00</div>
            <div id="dash-timer" style="color: #fb923c; font-weight: bold;"></div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn btn-1" onclick="showSub('sector-view')"><span>🏢</span><br>مناوبات القطاع</button>
            <button class="menu-btn btn-2" onclick="showSub('station-view')"><span>⚡</span><br>المحطات</button>
            <button class="menu-btn btn-3" onclick="showSub('report-view')"><span>📑</span><br>طباعة التقرير</button>
            <button class="menu-btn btn-4" onclick="confirmExit()"><span>🚪</span><br>خروج</button>
        </div>
    </div>

    <div id="sector-view" class="sub-page">
        <button class="back-btn" onclick="hideSub()">🔙 العودة للرئيسية</button>
        <div id="sector-content" style="overflow-y: auto; flex-grow: 1;"></div>
    </div>

    <div id="report-view" class="sub-page">
        <button class="back-btn" onclick="hideSub()">🔙 العودة</button>
        <div class="report-box">
            <h3>توليد سجل المناوبات</h3>
            <label>من تاريخ:</label>
            <input type="date" id="date-from">
            <label>إلى تاريخ:</label>
            <input type="date" id="date-to">
            <button class="enter-btn" style="width:100%; margin-top:20px;" onclick="generateAdvancedPDF()">تحميل PDF التقرير</button>
        </div>
    </div>

<script>
    // بيانات اليوم كنقطة انطلاق (السبت 4 نيسان 2026)
    const START_REF = new Date(2026, 3, 4, 8, 0, 0); 

    const staff = {
        "القطاع": { color: "#3b82f6", type: "daily", list: [
            {n: "احمد علي هزاع", p: "07708504330"}, {n: "مؤيد انور علي", p: "07702307824"}, 
            {n: "محمد أصغر شريف", p: "07705119671"}, {n: "علي عبدالكريم حسين", p: "07705122140"}
        ]},
        "صيانة داقوق": { color: "#fb923c", type: "daily", list: [
            {n: "جمعة احمد علاوي", p: "07706671144"}, {n: "خنكار رضا قادر", p: "07748193844"}, {n: "سليم طه بزون", p: "07704307475"}
        ]},
        "صيانة تازة": { color: "#c084fc", type: "daily", list: [
            {n: "مكرم شاكر صالح", p: "07738321128"}, {n: "غريب عبدالله علي", p: "07738321108"}, 
            {n: "عقيل حمدي خورشيد", p: "07719849187"}, {n: "عماد حسن حسين", p: "07701231951"}
        ]},
        "صيانة ليلان": { color: "#f87171", type: "two-day", list: [
            {n: "محمد داود طعمة", p: "07702365033"}, {n: "هشام كريم علي", p: "07706668042"}, {n: "شعبان خلف طعمة", p: "07735876486"}
        ]},
        "صيانة الرشاد": { color: "#4adede", type: "two-day", list: [
            {n: "زياد خلف حسن", p: "07705032908"}, {n: "عبدالستار احمد صالح", p: "07704914902"}
        ]},
        "الحراس": { color: "#10b981", type: "daily", list: [
            {n: "احمد نورالدين", p: "07708592190"}, {n: "كاظم اسماعيل", p: "07701074918"}, {n: "عقيل أصغر", p: "07701274082"}
        ]}
    };

    function openDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'flex';
        updateTime();
        renderSectorCards();
    }

    function updateTime() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('dash-date').innerText = now.toLocaleDateString('ar-EG', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
            document.getElementById('dash-clock').innerText = now.toLocaleTimeString('ar-EG');
            
            let next = new Date();
            next.setHours(8, 0, 0, 0);
            if (now.getHours() >= 8) next.setDate(next.getDate() + 1);
            let diff = next - now;
            let h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            document.getElementById('dash-timer').innerText = `تبديل الوجبة بعد: ${h}س ${m}د ${s}ث`;
        }, 1000);
    }

    function getIndex(key, targetDate) {
        const config = staff[key];
        const dateClone = new Date(targetDate);
        if (dateClone.getHours() < 8) dateClone.setDate(dateClone.getDate() - 1);
        
        const diffDays = Math.floor((dateClone - START_REF) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return 0; // للحماية من تواريخ قبل اليوم
        
        return config.type === "two-day" ? Math.floor(diffDays / 2) % config.list.length : diffDays % config.list.length;
    }

    function renderSectorCards() {
        let html = '';
        const now = new Date();
        for (let key in staff) {
            const person = staff[key].list[getIndex(key, now)];
            html += `
                <div class="shift-card" style="border-right-color: ${staff[key].color}">
                    <div style="flex-grow: 1;">
                        <div style="font-size: 0.8rem; opacity: 0.7;">${key}</div>
                        <div style="font-size: 1.1rem; font-weight: bold;">${person.n}</div>
                        <div style="color: var(--accent-1);">📞 ${person.p}</div>
                    </div>
                    <div style="font-size: 2rem; opacity: 0.3;">👥</div>
                </div>`;
        }
        document.getElementById('sector-content').innerHTML = html;
    }

    function showSub(id) { document.getElementById(id).style.display = 'flex'; }
    function hideSub() { document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none'); }
    function confirmExit() { if(confirm("هل تريد الخروج؟")) location.reload(); }

    // إصلاح ملف PDF والبيانات
    async function generateAdvancedPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'pt', 'a4'); // وضع عرضي ليناسب الأعمدة
        
        const from = new Date(document.getElementById('date-from').value);
        const to = new Date(document.getElementById('date-to').value);
        
        if (isNaN(from)) return alert("اختر تاريخاً صحيحاً");

        let rows = [];
        let curr = new Date(from);
        curr.setHours(9, 0, 0); // لضمان حساب اليوم بشكل صحيح

        while (curr <= to) {
            rows.push([
                curr.toLocaleDateString('ar-EG'),
                staff["القطاع"].list[getIndex("القطاع", curr)].n,
                staff["صيانة داقوق"].list[getIndex("صيانة داقوق", curr)].n,
                staff["صيانة تازة"].list[getIndex("صيانة تازة", curr)].n,
                staff["صيانة ليلان"].list[getIndex("صيانة ليلان", curr)].n,
                staff["صيانة الرشاد"].list[getIndex("صيانة الرشاد", curr)].n,
                staff["الحراس"].list[getIndex("الحراس", curr)].n
            ]);
            curr.setDate(curr.getDate() + 1);
        }

        doc.text("سجل مناوبات قطاع داقوق - 2026", 400, 40, { align: 'center' });
        doc.autoTable({
            head: [['التاريخ', 'القطاع', 'داقوق', 'تازة', 'ليلان', 'الرشاد', 'الحراس']],
            body: rows,
            styles: { font: 'courier', halign: 'center' },
            headStyles: { fillColor: [30, 41, 59] }
        });

        doc.save(`Shift_Report_2026.pdf`);
    }

    // منطق PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-banner').style.display = 'block';
    });

    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                document.getElementById('install-banner').style.display = 'none';
                deferredPrompt = null;
            });
        }
    }
</script>
</body>
</html>
